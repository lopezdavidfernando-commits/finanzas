  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fg\"><label>Categoría<\u002Flabel><select id=\"f-c\"><\u002Fselect><\u002Fdiv>\n      <div id=\"tf-income-ac\" style=\"display:none\"><div class=\"fg\"><label>Cuenta donde entra<\u002Flabel><select id=\"f-ac-inc\"><\u002Fselect><\u002Fdiv><\u002Fdiv>\n      <div id=\"tf-gasto\"><div class=\"fg\"><label>Cuenta<\u002Flabel><select id=\"f-ac\"><\u002Fselect><\u002Fdiv><\u002Fdiv>\n      <div id=\"tf-shared\" style=\"display:none\">\n        <div class=\"fgrow\">\n          <div class=\"fg\"><label>A cargo de<\u002Flabel><select id=\"f-ch\" onchange=\"updateStatusOptions()\"><option>David<\u002Foption><option>Lina<\u002Foption><option>Los dos<\u002Foption><option>Otro<\u002Foption><\u002Fselect><\u002Fdiv>\n          <div class=\"fg\"><label>Fuente<\u002Flabel><select id=\"f-so\"><option>Tarjeta crédito<\u002Foption><option>Tarjeta débito<\u002Foption><option>Efectivo<\u002Foption><\u002Fselect><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"fg\"><label>Estado<\u002Flabel><select id=\"f-st\" onchange=\"updatePayAccVis()\"><option value=\"Paid\">Pagado<\u002Foption><option value=\"Unpaid\">Pendiente<\u002Foption><option value=\"DavidPaidLinaPending\">David pago - Lina pendiente<\u002Foption><option value=\"LinaPaidDavidPending\">Lina pago - David pendiente<\u002Foption><\u002Fselect><\u002Fdiv>\n        <div class=\"fg\" id=\"payacc-row\" style=\"display:none\"><label>De donde salio el dinero?<\u002Flabel><select id=\"f-payacc\"><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"btnp\" onclick=\"saveTx()\">Guardar<\u002Fbutton>\n      <div id=\"delbtn-wrap\" style=\"display:none;margin-top:12px;padding:12px 0 0;border-top:.5px solid var(--border)\">\n        <button style=\"width:100%;background:var(--red-bg);color:var(--red);border:.5px solid rgba(248,113,113,.4);border-radius:12px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit\" onclick=\"delTx()\">🗑 Eliminar movimiento<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"mback\" id=\"m-cfg\">\n  <div class=\"msh\">\n    <div class=\"mhnd\"><\u002Fdiv>\n    <div class=\"mhdr\"><h2 id=\"cfg-ttl\">Nueva cuenta<\u002Fh2><button class=\"xbtn\" onclick=\"closeM('m-cfg')\">✕<\u002Fbutton><\u002Fdiv>\n    <div class=\"mbody\">\n      <div class=\"fg\"><label id=\"cfg-lbl\">Nombre<\u002Flabel><input id=\"cfg-n\" type=\"text\"><\u002Fdiv>\n      <div class=\"fg\">\n        <label>Ícono<\u002Flabel>\n        <div id=\"cfg-grid\" class=\"icogrid\"><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:9px;margin-top:10px\">\n          <span style=\"font-size:11.5px;color:var(--text2);font-weight:600\">o usa un emoji<\u002Fspan>\n          <input id=\"cfg-ic\" type=\"text\" maxlength=\"4\" placeholder=\"💳\" style=\"width:62px;text-align:center\" oninput=\"onEmojiInput()\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fg\" id=\"cfg-br\" style=\"display:none\"><label>Saldo actual (COP)<\u002Flabel><input id=\"cfg-b\" type=\"text\" placeholder=\"0\" inputmode=\"numeric\" oninput=\"formatMoneyInput(this)\"><\u002Fdiv>\n      <button class=\"btnp\" onclick=\"saveCfg()\">Guardar<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"mback\" id=\"m-drive\">\n  <div class=\"msh\">\n    <div class=\"mhnd\"><\u002Fdiv>\n    <div class=\"mhdr\"><h2>Conectar Google Drive<\u002Fh2><button class=\"xbtn\" onclick=\"closeM('m-drive')\">✕<\u002Fbutton><\u002Fdiv>\n    <div class=\"mbody\">\n      <p style=\"font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:16px\">Para guardar automáticamente en Drive necesitas un <strong style=\"color:var(--text)\">Client ID de Google<\u002Fstrong> (gratis, 5 min).<\u002Fp>\n      <div style=\"background:var(--bg3);border-radius:10px;padding:14px;margin-bottom:16px;font-size:12px;color:var(--text2);line-height:1.8\">\n        <div style=\"font-size:11px;font-weight:700;color:var(--lime);margin-bottom:6px\">Pasos:<\u002Fdiv>\n        1. Ve a console.cloud.google.com<br>2. Crea proyecto Finanzas David<br>3. APIs &gt; Credenciales &gt; OAuth &gt; App web<br>4. Activa Google Drive API<br>5. Pega el Client ID abajo\n      <\u002Fdiv>\n      <div class=\"fg\"><label>Client ID<\u002Flabel><input id=\"drive-cid\" type=\"text\" placeholder=\"123456789-abc.apps.googleusercontent.com\"><\u002Fdiv>\n      <button class=\"btnp\" onclick=\"saveDriveCid()\">Conectar Drive<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- MODAL: CONFIRM DELETE -->\n<div class=\"mback\" id=\"m-confirm\" style=\"align-items:center;justify-content:center;padding:20px\">\n  <div style=\"background:var(--bg2);border-radius:20px;width:100%;max-width:340px;overflow:hidden;border:.5px solid var(--border2)\">\n    <div style=\"padding:20px;text-align:center\">\n      <div style=\"font-size:32px;margin-bottom:10px\">🗑️<\u002Fdiv>\n      <div style=\"font-size:16px;font-weight:700;margin-bottom:6px\" id=\"confirm-title\">Eliminar movimiento<\u002Fdiv>\n      <div style=\"font-size:13px;color:var(--text2);line-height:1.5\" id=\"confirm-desc\">Esta accion no se puede deshacer (pero puedes revertir desde el historial).<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;border-top:.5px solid var(--border)\">\n      <button onclick=\"closeM('m-confirm')\" style=\"flex:1;padding:14px;border:none;border-right:.5px solid var(--border);background:none;color:var(--text2);font-size:15px;font-weight:500;cursor:pointer;font-family:inherit\">Cancelar<\u002Fbutton>\n      <button id=\"confirm-ok-btn\" style=\"flex:1;padding:14px;border:none;background:none;color:var(--red);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit\">Eliminar<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- MODAL: ACCOUNT DETAIL -->\n<div class=\"mback\" id=\"m-acct\">\n  <div class=\"msh\" style=\"max-height:92vh\">\n    <div class=\"mhnd\"><\u002Fdiv>\n    <div class=\"mhdr\">\n      <h2 id=\"acct-modal-title\">Bancolombia<\u002Fh2>\n      <button class=\"xbtn\" onclick=\"closeM('m-acct')\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"padding:14px 20px;border-bottom:.5px solid var(--border)\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:3px\">\n        <div style=\"font-size:11px;color:var(--text2);font-weight:600\">SALDO ACTUAL<\u002Fdiv>\n\n      <\u002Fdiv>\n      <div id=\"acct-modal-balance\" style=\"font-size:28px;font-weight:800;letter-spacing:-1px\"><\u002Fdiv>\n      <div id=\"acct-modal-calc\" style=\"font-size:11px;color:var(--text2);margin-top:3px\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;border-bottom:.5px solid var(--border)\">\n      <div style=\"flex:1;padding:12px 16px;text-align:center;border-right:.5px solid var(--border)\">\n        <div style=\"font-size:10px;font-weight:600;color:var(--text2);margin-bottom:2px\">ENTRADAS<\u002Fdiv>\n        <div id=\"acct-modal-inc\" style=\"font-size:16px;font-weight:700;color:var(--green)\">$0<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;padding:12px 16px;text-align:center\">\n        <div style=\"font-size:10px;font-weight:600;color:var(--text2);margin-bottom:2px\">SALIDAS (tu parte)<\u002Fdiv>\n        <div id=\"acct-modal-exp\" style=\"font-size:16px;font-weight:700;color:var(--red)\">$0<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Conciliador bancario -->\n    <div style=\"margin:12px 16px;background:var(--bg3);border-radius:12px;padding:12px;border:.5px solid var(--border2)\">\n      <div style=\"font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px\">Conciliador bancario<\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;margin-bottom:6px\">\n        <span style=\"font-size:12px;color:var(--text2)\">Débitos reales de la cuenta<\u002Fspan>\n        <span id=\"acct-real-debits\" style=\"font-size:12px;font-weight:700;color:var(--red)\">$0<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;margin-bottom:6px\">\n        <span style=\"font-size:12px;color:var(--text2)\">Tu parte registrada<\u002Fspan>\n        <span id=\"acct-my-part\" style=\"font-size:12px;font-weight:700;color:var(--text)\">$0<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"height:.5px;background:var(--border);margin:8px 0\"><\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;align-items:center\">\n        <span style=\"font-size:12px;font-weight:600;color:var(--text2)\">Adelantado por ti<\u002Fspan>\n        <span id=\"acct-adelanto\" style=\"font-size:14px;font-weight:800;color:var(--amber)\">$0<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:10px;color:var(--text3);margin-top:4px\">Pagos que hiciste por otros y aún no te han reembolsado<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"txwrap\" id=\"acct-modal-list\" style=\"padding-bottom:20px\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n// ALL JS uses createElement — zero string concatenation with quotes\nvar ls = {\n  g: function(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}},\n  s: function(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}\n};\n\nvar DA = [{id:'a1',name:'Bancolombia',icon:'@bank',balance:0},{id:'a2',name:'Nu Bank',icon:'@card',balance:0},{id:'a3',name:'Efectivo',icon:'@cash',balance:0}];\nvar DC = {\n  income:[{id:'ci1',name:'Empleo',icon:'@briefcase'},{id:'ci2',name:'Freelance',icon:'@laptop'},{id:'ci3',name:'Dividendos',icon:'@trend'},{id:'ci4',name:'Otros ingresos',icon:'@coins'}],\n  expenses:[{id:'ce1',name:'Arriendo',icon:'@home'},{id:'ce2',name:'Servicios',icon:'@bulb'},{id:'ce3',name:'Mercado',icon:'@cart'},{id:'ce4',name:'Comidas fuera',icon:'@food'},{id:'ce5',name:'Transporte',icon:'@car'},{id:'ce6',name:'Mantenimiento',icon:'@tools'},{id:'ce7',name:'Seguro carro',icon:'@shield'},{id:'ce8',name:'Viajes',icon:'@plane'},{id:'ce9',name:'Telefono',icon:'@phone'},{id:'ce10',name:'Freelance gasto',icon:'@laptop'},{id:'ce11',name:'Educacion',icon:'@book'},{id:'ce12',name:'Deporte',icon:'@ball'},{id:'ce13',name:'Gastos personales',icon:'@tag'},{id:'ce14',name:'Salud',icon:'@health'},{id:'ce15',name:'Ropa',icon:'@shirt'},{id:'ce16',name:'Suscripciones',icon:'@repeat'},{id:'ce17',name:'Regalos',icon:'@gift'},{id:'ce18',name:'Cadena',icon:'@tag'},{id:'ce19',name:'Otros gastos',icon:'@box'}],\n  savings:[{id:'cs1',name:'Fondo renovacion',icon:'@building'},{id:'cs2',name:'Fondo emergencia',icon:'@shield'},{id:'cs3',name:'Inversion',icon:'@chart'},{id:'cs4',name:'Proximo viaje',icon:'@plane'}]\n};\n\nvar accts=ls.g('ac7',DA), cats=ls.g('ca7',DC), txs=ls.g('tx7',[]), budgets=ls.g('bu7',{});\n// One-time upgrade: default emojis → minimalist line icons (custom emojis untouched)\n(function migrateIcons(){\n  if(ls.g('icmig7',false))return;\n  var M={'🏦':'@bank','💜':'@card','💳':'@card','💵':'@cash','💼':'@briefcase','💻':'@laptop','📈':'@trend','💰':'@coins','🏠':'@home','💡':'@bulb','🛒':'@cart','🍽️':'@food','🚗':'@car','🔧':'@tools','🛡️':'@shield','✈️':'@plane','📱':'@phone','📚':'@book','🎾':'@ball','🧴':'@tag','🏥':'@health','👕':'@shirt','🔁':'@repeat','🎁':'@gift','🔗':'@tag','📦':'@box','🏗️':'@building','🆘':'@shield','📊':'@chart','🗺️':'@plane','🪙':'@wallet'};\n  accts.forEach(function(a){if(M[a.icon])a.icon=M[a.icon];});\n  ['income','expenses','savings'].forEach(function(k){if(cats[k])cats[k].forEach(function(c){if(M[c.icon])c.icon=M[c.icon];});});\n  ls.s('ac7',accts);ls.s('ca7',cats);ls.s('icmig7',true);\n})();\nvar driveCid=ls.g('dc7',''), driveToken=ls.g('dt7',''), driveFileId=ls.g('df7',''), driveSt='off';\nvar curY=new Date().getFullYear(), curM=new Date().getMonth(), sumY=new Date().getFullYear();\nvar curFilt='all', curFiltExp='all', editId=null, mTab='tracking', txType='Expenses', cfgType='', cfgEditId=null, cfgIcon='';\nvar blurred=ls.g('bl7',false), theme=ls.g('th7','dark'), sumTab='ov';\nvar iconStyle=ls.g('ic7','color');\nvar userName=ls.g('un7','David');\nvar sumMode='year', sumM=new Date().getMonth();\nvar changeHistory=ls.g('hist7',[]);\n\nfunction pushHistory(label){\n  var snap={txs:JSON.parse(JSON.stringify(txs)),accts:JSON.parse(JSON.stringify(accts)),cats:JSON.parse(JSON.stringify(cats)),budgets:JSON.parse(JSON.stringify(budgets))};\n  changeHistory.unshift({id:uid(),label:label,at:new Date().toISOString(),snap:snap});\n  if(changeHistory.length>30)changeHistory=changeHistory.slice(0,30);\n  ls.s('hist7',changeHistory);\n}\n\nfunction revertHistory(hid){\n  var idx=-1;for(var i=0;i<changeHistory.length;i++){if(changeHistory[i].id===hid){idx=i;break;}}\n  if(idx<0)return;\n  showConfirm('Revertir cambio','Se perderan los cambios realizados despues de este punto.',function(){\n  var snap=changeHistory[idx].snap;\n  txs=JSON.parse(JSON.stringify(snap.txs));\n  accts=JSON.parse(JSON.stringify(snap.accts));\n  cats=JSON.parse(JSON.stringify(snap.cats));\n  budgets=JSON.parse(JSON.stringify(snap.budgets));\n  ls.s('tx7',txs);ls.s('ac7',accts);ls.s('ca7',cats);ls.s('bu7',budgets);\n  changeHistory=changeHistory.slice(idx+1);\n  ls.s('hist7',changeHistory);\n  renderAll();syncDrive();\n  });\n}\n\nvar histExpanded=false;\nfunction showConfirm(title,desc,onOk){\n  document.getElementById('confirm-title').textContent=title;\n  document.getElementById('confirm-desc').textContent=desc;\n  var btn=document.getElementById('confirm-ok-btn');\n  var newBtn=btn.cloneNode(true);\n  btn.parentNode.replaceChild(newBtn,btn);\n  newBtn.addEventListener('click',function(){closeM('m-confirm');onOk();});\n  document.getElementById('m-confirm').classList.add('open');\n}\n\nvar currentAcctId=null;\n\nfunction recalcAcctBalance(){\n  var acct=null;for(var i=0;i<accts.length;i++){if(accts[i].id===currentAcctId){acct=accts[i];break;}}\n  if(!acct)return;\n  var calc=0;\n  txs.forEach(function(t){\n    if(t.accountId===currentAcctId&&t.mode==='tracking'){\n      var affects=(t.type==='Income'||(t.type==='Expenses'&&t.status==='Paid'));\n      if(affects)calc+=t.type==='Income'?t.amount:-t.amount;\n    }\n  });\n  acct.balance=calc;\n  ls.s('ac7',accts);\n  document.getElementById('acct-modal-balance').textContent=fmt(calc);\n  document.getElementById('acct-modal-calc').textContent='Saldo recalculado desde movimientos';\n  document.getElementById('acct-modal-calc').style.color='var(--green)';\n  renderAll();\n  // re-open to refresh\n  openAcctModal(currentAcctId);\n}\n\nfunction openAcctModal(acctId){\n  currentAcctId=acctId;\n  var acct=null;for(var i=0;i<accts.length;i++){if(accts[i].id===acctId){acct=accts[i];break;}}\n  if(!acct)return;\n  document.getElementById('acct-modal-title').textContent=icoLabel(acct.icon,acct.name);\n  document.getElementById('acct-modal-balance').textContent=fmt(acct.balance||0);\n\n  // Get all txs affecting this account\n  var related=txs.filter(function(t){\n    return t.accountId===acctId&&t.mode==='tracking';\n  }).sort(function(a,b){return new Date(b.date)-new Date(a.date);});\n\n  var totalInc=0,totalExp=0;\n  related.forEach(function(t){\n    if(t.type==='Income')totalInc+=t.amount;\n    else totalExp+=t.amount;\n  });\n  document.getElementById('acct-modal-inc').textContent=fmt(totalInc);\n  document.getElementById('acct-modal-exp').textContent=fmt(totalExp);\n  var calcEl=document.getElementById('acct-modal-calc');\n  calcEl.textContent='Calculado desde '+related.length+' movimientos';\n  calcEl.style.color='var(--text3)';\n\n  // Conciliador: find shared expenses paid from this account (full amount debited)\n  // but only David's part registered in app\n  var realDebits=0; // total actually debited from account\n  var myPart=0;     // only David's share registered in app\n  var adelanto=0;   // difference = amount paid on behalf of others\n\n  // Find shared expense originals that were paid from this account\n  txs.forE nt/2;}\n    if(t.status==='DavidPaidLinaPending')bD=0;else if(t.status==='LinaPaidDavidPending')bL=0;\n    pend+=bD+bL+bO;\n  });\n  var kp=clr('d-kpis');\n  [\n    {nm:'Disponible',sub:'este mes',ic:'@trend',tint:'var(--limetint)',v:avail},\n    {nm:'Ahorro',sub:'este mes',ic:'@dollar',tint:'var(--lav)',v:ahorro},\n    {nm:'Pendiente',sub:'por saldar',ic:'@clock',tint:'var(--peach)',v:pend}\n  ].forEach(function(k){\n    var card=el('div',{cls:'kpic'});\n    var hd=el('div',{cls:'kpic-hd'});\n    hd.appendChild(el('div',{},[el('div',{cls:'kpic-nm',txt:k.nm}),el('div',{cls:'kpic-sub',txt:k.sub})]));\n    hd.appendChild(el('div',{cls:'kpic-ic',html:icoHTML(k.ic)}));\n    card.appendChild(hd);\n    card.appendChild(el('div',{cls:'kpic-v',txt:fmtb(k.v)}));\n    kp.appendChild(card);\n  });\n\n  // Accounts (neutral icon chips)\n  var ac=clr('d-accts');\n  accts.forEach(function(a,i){\n    var pill=el('div',{cls:'apill',style:'cursor:pointer'});\n    pill.appendChild(el('div',{cls:'ai',html:icoHTML(a.icon)}));\n    pill.appendChild(el('div',{cls:'an',txt:a.name}));\n    pill.appendChild(el('div',{cls:'av',txt:fmtb(a.balance||0)}));\n    pill.addEventListener('click',(function(aid){return function(){openAcctModal(aid);};})(a.id));\n    ac.appendChild(pill);\n  });\n\n  // Vertical bars\n  var catData=[];\n  cats.expenses.forEach(function(c){\n    var tracked=0;tr.forEach(function(t){if(t.type==='Expenses'&&t.category===c.name)tracked+=t.amount;});\n    var b=budget[c.name]||0;\n    if(tracked>0||b>0)catData.push({name:c.name,icon:c.icon,tracked:tracked,b:b});\n  });\n  catData.sort(function(a,b){var ap=a.b>0?a.tracked/a.b:0,bp=b.b>0?b.tracked/b.b:0;return bp-ap;});\n  catData=catData.slice(0,8);\n  var maxV=1;catData.forEach(function(c){if(Math.max(c.tracked,c.b)>maxV)maxV=Math.max(c.tracked,c.b);});\n  var BH=110,vb=clr('d-vbars');\n  if(!catData.length){vb.appendChild(el('p',{txt:'Sin datos — agrega un presupuesto',style:'font-size:13px;color:var(--text3);padding:16px lue=dsc;dl.appendChild(opt);\n    }\n  }\n}\n\nfunction populateAcSel(){\n  ['f-ac','f-ac-inc','f-payacc'].forEach(function(id){\n    var sel=document.getElementById(id);if(!sel)return;\n    while(sel.firstChild)sel.removeChild(sel.firstChild);\n    accts.forEach(function(a){\n      var opt=document.createElement('option');opt.value=a.id;opt.textContent=icoLabel(a.icon,a.name);sel.appendChild(opt);\n    });\n  });\n}\n\nfunction populateCatSel(){\n  var s=document.getElementById('f-c');if(!s)return;\n  while(s.firstChild)s.removeChild(s.firstChild);\n  var list=(mTab==='income')?cats.income:cats.expenses.concat(cats.savings);\n  list.forEach(function(c){\n    var opt=document.createElement('option');opt.value=c.name;opt.textContent=icoLabel(c.icon,c.name);s.appendChild(opt);\n  });\n}\n\nfunction setMTab(t){\n  mTab=t;\n  document.getElementById('mt-inc').classList.toggle('active',t==='income');\n  document.getElementById('mt-gasto').classList.toggle('active',t==='gasto');\n  document.getElementById('mt-shared').classList.toggle('active',t==='shared');\n  document.getElementById('tf-income-ac').style.display=(t==='income')?'block':'none';\n  document.getElementById('tf-gasto').style.display=(t==='gasto')?'block':'none';\n  document.getElementById('tf-shared').style.display=(t==='shared')?'block':'none';\n  if(t==='income')txType='Income';else txType='Expenses';\n  populateCatSel();\n}\n\nfunction setTT(t){txType=t;populateCatSel();}\n\nfunction updateStatusOptions(){\n  var chSel=document.getElementById('f-ch');if(!chSel)return;\n  var charge=chSel.value;\n  var stSel=document.getElementById('f-st');if(!stSel)return;\n  var currentVal=stSel.value;\n  while(stSel.firstChild)stSel.removeChild(stSel.firstChild);\n  function addOpt(val,label){var o=document.createElement('option');o.value=val;o.textContent=label;stSel.appendChild(o);}\n  if(charge==='Los dos'){\n    addOpt('Paid','Pagado');\n    addOpt('Unpaid','Pendiente');\n    addOpt('DavidPaidLinaPending','David pago - Lina pendiente');\n    addOpt('LinaPaidDavidPending','Lina pago - David pendiente');\n  } else {\n    addOpt('Unpaid','Pendiente');\n    addOpt('Paid','Pagado');\n  }\n  // Restore previous value if still valid, otherwise default to first option\n  var stillValid=false;\n  for(var i=0;i<stSel.options.length;i++){if(stSel.options[i].value===currentVal){stillValid=true;break;}}\n  stSel.value=stillValid?currentVal:stSel.options[0].value;\n  updatePayAccVis();\n}\n\nfunction updatePayAccVis(){\n  var stEl=document.getElementById('f-st');if(!stEl)return;\n  var st=stEl.value;\n  var chEl=document.getElementById('f-ch');\n  var charge=chEl?chEl.value:'';\n  // Only show \"de donde salio el dinero\" when David is the one paying:\n  // either charge=David and status=Paid, or charge=Los dos and status is Paid or DavidPaidLinaPending\n  var show=false;\n  if(charge==='David'&&st==='Paid')show=true;\n  else if(charge==='Los dos'&&(st==='Paid'||st==='DavidPaidLinaPending'))show=true;\n  var row=document.getElementById('payacc-row');\n  if(row)row.style.display=show?'block':'none';\n}\n\nfunction saveUserName(){\n  var v=document.getElementById('s-username').value.trim()||'David';\n  userName=v;ls.s('un7',userName);\n  var hn=document.getElementById('hero-name');if(hn)hn.textContent=userName+' 👋';\n}\n\nfunction openTx(id){\n  editId=id;populateAcSel();populateDescList();\n  if(id){\n    var t=null;for(var i=0;i<txs.length;i++){if(txs[i].id===id){t=txs[i];break;}}\n    if(!t)return;\n    document.getElementById('tx-ttl').textContent='Editar movimiento';\n    document.getElementById('delbtn-wrap').style.display='block';\n    // If this is a linked tracking tx (copy of shared), open the parent shared tx\n    if(t.linkedFrom){\n      var parent=null;for(var i=0;i<txs.length;i++){if(txs[i].id===t.linkedFrom){parent=txs[i];break;}}\n      if(parent){closeM('m-tx');openTx(parent.id);return;}\n    }\n    var openTab;\n    if(t.mode==='expenses') openTab='shared';\n    else if(t.type==='Income') openTab='income';\n    else openTab='gasto';\n    setMTab(openTab);\n    document.getElementById('f-d').value=t.description;\n    document.getElementById('f-m').value=t.amount.toLocaleString('es-CO');\n    document.getElementById('f-dt').value=t.date;\n    setTimeout(function(){document.getElementById('f-c').value=t.category;},10);\n    if(t.mode==='tracking'){\n      if(t.type==='Income')document.getElementById('f-ac-inc').value=t.accountId||accts[0].id;\n      else document.getElementById('f-ac').value=t.accountId||accts[0].id;\n    }\n    else{document.getElementById('f-ch').value=t.charge||'Los dos';updateStatusOptions();document.getElementById('f-so').value=t.source||'Tarjeta crédito';document.getElementById('f-st').value=t.status||'Paid';document.getElementById('f-payacc').value=t.payAccountId||accts[0].id;updatePayAccVis();}\n  } else {\n    document.getElementById('tx-ttl').textContent='Nuevo movimiento';\n    document.getElementById('delbtn-wrap').style.display='none';\n    document.getElementById('f-d').value='';document.getElementById('f-m').value='';\n    document.getElementById('f-dt').value=new Date().toISOString().split('T')[0];\n    var ap=document.querySelector('.page.active');\n    var defaultTab=ap&&ap.id==='page-expenses'?'shared':'gasto';\n    setMTab(defaultTab);\n    document.getElementById('f-ch').value='David';\n    updateStatusOptions();\n    document.getElementById('f-st').value=(defaultTab==='shared')?'Unpaid':'Paid';\n    if(accts[0]){document.getElementById('f-payacc').value=accts[0].id;document.getElementById('f-ac-inc').value=accts[0].id;}\n    updatePayAccVis();\n  }\n  document.getElementById('m-tx').classList.add('open');\n}\n\nfunction removeLinkedTx(linkedId){\n  if(!linkedId)return;\n  var idx=-1;for(var i=0;i<txs.length;i++){if(txs[i].id===linkedId){idx=i;break;}}\n  if(idx>=0){\n    txs.splice(idx,1);\n    // Balance recalculated automatically via recalcAllBalances()\n  }\n}\nfunction createLinkedTx(t,payAccId,shareAmount,existingId){\n  var acct=null;for(var i=0;i<accts.length;i++){if(accts[i].id===payAccId){acct=accts[i];break;}}\n  var isShared=(t.charge==='Los dos');\n  var cleanDesc=t.description.replace(/ \\(compartido\\)/g,'');\n  var ltId=existingId||uid();\n  var lt={id:ltId,mode:'tracking',type:'Expenses',description:isShared?(cleanDesc+' (compartido)'):cleanDesc,amount:shareAmount,date:t.date,category:t.category,account:acct?acct.name:'',accountId:payAccId,linkedFrom:t.id,isShared:isShared,charge:null,source:null,status:null,linkedTxId:null,payAccountId:null};\n  var found=false;\n  for(var i=0;i<txs.length;i++){if(txs[i].id===ltId){txs[i]=lt;found=true;break;}}\n  if(!found)txs.unshift(lt);\n  return ltId;\n}\n\nfunction saveTx(){\n  var desc=document.getElementById('f-d').value.trim();\n  var amount=rawNum(document.getElementById('f-m'));\n  var date=document.getElementById('f-dt').value;\n  var cat=document.getElementById('f-c').value;\n  if(!desc||!amount||!date){alert('Completa descripcion, monto y fecha');return;}\n  pushHistory((editId?'Editar movimiento: ':'Nuevo movimiento: ')+desc);\n  var aId=(mTab==='income')?document.getElementById('f-ac-inc').value:document.getElementById('f-ac').value;\n  var acct=null;for(var i=0;i<accts.length;i++){if(accts[i].id===aId){acct=accts[i];break;}}\n  var old=null;\n  if(editId){for(var i=0;i<txs.length;i++){if(txs[i].id===editId){old=txs[i];break;}}}\n  // Map mTab to mode/type\n  var txMode=(mTab==='shared')?'expenses':'tracking';\n  var txTypeResolved=(mTab==='income')?'Income':'Expenses';\n  var t={id:editId||uid(),mode:txMode,type:txTypeResolved,description:desc,amount:amount,date:date,category:cat,account:acct?acct.name:'',accountId:aId,charge:document.getElementById('f-ch').value,source:document.getElementById('f-so').value,status:document.getElementById('f-st').value||'Paid',linkedTxId:null,payAccountId:null,linkedFrom:(old&&old.linkedFrom)||null,isShared:(old&&old.isShared)||false};\n  // Balance is recalculated automatically in renderAll via recalcAllBalances()\n  if(txMode==='expenses'){\n    // Always remove old linked tx first to avoid duplicates\n    if(old&&old.linkedTxId)removeLinkedTx(old.linkedTxId);\n    var payerIsDavid=(t.status==='Paid'||t.status==='DavidPaidLinaPending');\n    var chargeVal=document.getElementById('f-ch')?document.getElementById('f-ch').value:'';\n    if(payerIsDavid&&(chargeVal==='David'||chargeVal==='Los dos')){\n      var payAccId=document.getElementById('f-payacc').value;\n      var shareAmount=(chargeVal==='Los dos')?(t.amount/2):t.amount;\n      t.payAccountId=payAccId;\n      // Pass existing linkedTxId so it updates instead of creating duplicate\n      var existingLinkedId=(old&&old.linkedTxId)||null;\n      t.linkedTxId=createLinkedTx(t,payAccId,shareAmount,existingLinkedId);\n    }\n  }\n  if(editId){for(var i=0;i<txs.length;i++){if(txs[i].id===editId){txs[i]=t;break;}}}else txs.unshift(t);\n  ls.s('tx7',txs);closeM('m-tx');renderAll();syncDrive();\n}\n\nfunction delTx(){\n  showConfirm('Eliminar movimiento','Esta accion no se puede deshacer (puedes revertir desde el historial de cambios).',function(){\n  var t=null;for(var i=0;i<txs.length;i++){if(txs[i].id===editId){t=txs[i];break;}}\n  pushHistory('Eliminar movimiento: '+(t?t.description:''));\n  // Balance recalculated automatically via recalcAllBalances()\n  if(t&&t.mode==='expenses'&&t.linkedTxId){removeLinkedTx(t.linkedTxId);}\n  // If this is a linked tracking tx, also remove the reference in parent\n  if(t&&t.linkedFrom){\n    for(var i=0;i<txs.length;i++){\n      if(txs[i].id===t.linkedFrom){txs[i].linkedTxId=null;txs[i].payAccountId=null;break;}\n    }\n  }\n  txs=txs.filter(function(x){return x.id!==editId;});\n  ls.s('tx7',txs);closeM('m-tx');renderAll();syncDrive();\n  });\n}\n\nfunction buildIcoGrid(){\n  var g=document.getElementById('cfg-grid');if(!g)return;g.innerHTML='';\n  Object.keys(ICONLIB).forEach(function(k){\n    var b=document.createElement('button');b.type='button';b.className='icobtn'+(cfgIcon==='@'+k?' active':'');\n    b.innerHTML=svgWrap(ICONLIB[k],20);\n    b.onclick=function(){cfgIcon='@'+k;document.getElementById('cfg-ic').value='';refreshIcoActive();};\n    g.appendChild(b);\n  });\n}\nfunction refreshIcoActive(){\n  var keys=Object.keys(ICONLIB);\n  document.querySelectorAll('#cfg-grid .icobtn').forEach(function(b,i){b.classList.toggle('active',cfgIcon==='@'+keys[i]);});\n}\nfunction onEmojiInput(){var v=document.getElementById('cfg-ic').value.trim();if(v){cfgIcon=v;}refreshIcoActive();}\n\nfunction openCfg(type,id){\n  cfgType=type;cfgEditId=id;\n  var titles={'account':'cuenta','cat-income':'ingreso','cat-expenses':'gasto','cat-savings':'ahorro'};\n  var isA=type==='account';\n  document.getElementById('cfg-ttl').textContent=(id?'Editar ':'Nueva ')+titles[type];\n  document.getElementById('cfg-lbl').textContent=isA?'Nombre de la cuenta':'Nombre de la categoria';\n  document.getElementById('cfg-br').style.display=isA?'block':'none';\n  document.getElementById('cfg-n').value='';document.getElementById('cfg-ic').value='';cfgIcon='';\n  if(isA)document.getElementById('cfg-b').value='';\n  if(id){\n    var all2=isA?accts:cats.income.concat(cats.expenses,cats.savings);\n    for(var i=0;i<all2.length;i++){if(all2[i].id===id){document.getElementById('cfg-n').value=all2[i].name||'';cfgIcon=all2[i].icon||'';if(cfgIcon.charAt(0)!=='@')document.getElementById('cfg-ic').value=cfgIcon;if(isA)document.getElementById('cfg-b').value=(all2[i].balance||0).toLocaleString('es-CO');break;}}\n  }\n  buildIcoGrid();\n  document.getElementById('m-cfg').classList.add('open');\n}\n\nfunction saveCfg(){\n  var name=document.getElementById('cfg-n').value.trim(),icon=cfgIcon||document.getElementById('cfg-ic').value.trim()||'📌';\n  if(!name){alert('Escribe un nombre');return;}\n  pushHistory((cfgEditId?'Editar ':'Agregar ')+(cfgType==='account'?'cuenta':'categoria')+': '+name);\n  if(cfgType==='account'){\n    var bal=rawNum(document.getElementById('cfg-b'));\n    if(cfgEditId){for(var i=0;i<accts.length;i++){if(accts[i].id===cfgEditId){accts[i].name=name;accts[i].icon=icon;accts[i].balance=bal;break;}}}\n    else accts.push({id:uid(),name:name,icon:icon,balance:bal});\n    ls.s('ac7',accts);\n  } else {\n    var key=cfgType.replace('cat-','');\n    if(cfgEditId){for(var i=0;i<cats[key].length;i++){if(cats[key][i].id===cfgEditId){cats[key][i].name=name;cats[key][i].icon=icon;break;}}}\n    else cats[key].push({id:uid(),name:name,icon:icon});\n    ls.s('ca7',cats);\n  }\n  closeM('m-cfg');renderAll();syncDrive();\n}\n\nfunction delCfg(type,id){\n  showConfirm('Eliminar elemento','Se eliminara de la lista. Puedes revertirlo desde el historial.',function(){\n  pushHistory('Eliminar '+(type==='account'?'cuenta':'categoria'));\n  if(type==='account')accts=accts.filter(function(a){return a.id!==id;});\n  else{var k=type.replace('cat-','');cats[k]=cats[k].filter(function(c){return c.id!==id;});}\n  ls.s(type==='account'?'ac7':'ca7',type==='account'?accts:cats);renderAll();syncDrive();\n  });\n}\n\nfunction exportData(){\n  var data={txs:txs,accts:accts,cats:cats,budgets:budgets,at:new Date().toISOString(),v:7};\n  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));\n  a.download='finanzas-'+new Date().toISOString().split('T')[0]+'.json';a.click();\n}\nfunction importData(e){\n  var file=e.target.files[0];if(!file)return;\n  var r=new FileReader();\n  r.onload=function(ev){\n    try{var d=JSON.parse(ev.target.result);if(!d.txs||!d.accts)throw new Error('Formato invalido');showConfirm('Restaurar datos','Se reemplazaran todos los datos actuales.',function(){txs=d.txs;accts=d.accts;cats=d.cats||DC;budgets=d.budgets||{};ls.s('tx7',txs);ls.s('ac7',accts);ls.s('ca7',cats);ls.s('bu7',budgets);renderAll();});}catch(err){alert('Error: '+err.message);}\n  };r.readAsText(file);\n}\n\nfunction handleDrive(){if(driveCid&&driveToken)syncDrive();else{document.getElementById('drive-cid').value=driveCid||'';document.getElementById('m-drive').classList.add('open');}}\nfunction saveDriveCid(){var c=document.getElementById('drive-cid').value.trim();if(!c){alert('Pega tu Client ID');return;}driveCid=c;ls.s('dc7',c);closeM('m-drive');initGAuth();}\nfunction initGAuth(){if(!document.getElementById('gsi-script')){var s=document.createElement('script');s.id='gsi-script';s.src='https://accounts.google.com/gsi/client';s.async=true;s.onload=function(){startGAuth();};document.head.appendChild(s);}else startGAuth();}\nfunction startGAuth(){if(!window.google){setTimeout(startGAuth,500);return;}var c=google.accounts.oauth2.initTokenClient({client_id:driveCid,scope:'https://www.googleapis.com/auth/drive.appdata https://www.googleapis.com/auth/drive.file',callback:function(r){if(r.error){driveSt='er';updateDriveUI();return;}driveToken=r.access_token;ls.s('dt7',driveToken);driveSt='sy';updateDriveUI();syncDrive();}});c.requestAccessToken();}\nfunction syncDrive(){\n  if(!driveToken||!driveCid)return;\n  driveSt='sy';updateDriveUI();\n  var data=JSON.stringify({txs:txs,accts:accts,cats:cats,budgets:budgets,at:new Date().toISOString(),v:7});\n  var p=driveFileId?updateDF(data):findOrCreate(data);\n  p.then(function(){driveSt='ok';ls.s('dts7',new Date().toISOString());updateDriveUI();}).catch(function(e){if(e&&e.status===401){driveToken='';ls.s('dt7','');}driveSt='er';updateDriveUI();});\n}\nfunction findOrCreate(data){\n  return fetch('https://www.googleapis.com/drive/v3/files?q=name%3D%22finanzas-david-data.json%22+and+trashed%3Dfalse&spaces=drive,appDataFolder',{headers:{Authorization:'Bearer '+driveToken}}).then(function(r){return r.json();}).then(function(sd){\n    if(sd.files&&sd.files.length>0){driveFileId=sd.files[0].id;ls.s('df7',driveFileId);return updateDF(data);}\n    var meta=new Blob([JSON.stringify({name:'finanzas-david-data.json',parents:['appDataFolder']})],{type:'application/json'});\n    var form=new FormData();form.append('metadata',meta);form.append('file',new Blob([data],{type:'application/json'}));\n    return fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:'Bearer '+driveToken},body:form}).then(function(r){if(!r.ok)throw{status:r.status};return r.json();}).then(function(fd){driveFileId=fd.id;ls.s('df7',driveFileId);});\n  });\n}\nfunction updateDF(data){return fetch('https://www.googleapis.com/upload/drive/v3/files/'+driveFileId+'?uploadType=media',{method:'PATCH',headers:{Authorization:'Bearer '+driveToken,'Content-Type':'application/json'},body:new Blob([data],{type:'application/json'})}).then(function(r){if(!r.ok)throw{status:r.status};});}\nfunction loadFromDrive(){\n  if(!driveToken||!driveFileId)return;\n  fetch('https://www.googleapis.com/drive/v3/files/'+driveFileId+'?alt=media',{headers:{Authorization:'Bearer '+driveToken}}).then(function(r){return r.ok?r.json():null;}).then(function(d){if(!d)return;txs=d.txs||[];accts=d.accts||DA;cats=d.cats||DC;budgets=d.budgets||{};ls.s('tx7',txs);ls.s('ac7',accts);ls.s('ca7',cats);ls.s('bu7',budgets);renderAll();}).catch(function(){});\n}\nfunction updateDriveUI(){\n  var dot=document.getElementById('ddot'),txt=document.getElementById('dtxt'),btn=document.getElementById('dbtn');\n  var sn=document.getElementById('s-drn'),ss=document.getElementById('s-drs'),sb=document.getElementById('s-drb');\n  if(!dot)return;\n  if(driveSt==='ok'){dot.className='ddot ok';var ts=ls.g('dts7','');txt.textContent='Sincronizado'+(ts?' · '+new Date(ts).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}):'');if(btn)btn.textContent='Sync';if(sn)sn.textContent='Google Drive conectado';if(ss)ss.textContent='Datos seguros en la nube';if(sb)sb.textContent='Sync';}\n  else if(driveSt==='sy'){dot.className='ddot sy';txt.textContent='Guardando...';if(btn)btn.textContent='...';}\n  else if(driveSt==='er'){dot.className='ddot er';txt.textContent='Error Drive';if(btn)btn.textContent='Reconectar';if(sn)sn.textContent='Error';if(sb)sb.textContent='Reconectar';}\n  else{dot.className='ddot';txt.textContent='Sin sincronizacion';if(btn)btn.textContent='Conectar Drive';if(sn)sn.textContent='Sin conexion';if(ss)ss.textContent='Datos solo en este celular';if(sb)sb.textContent='Conectar';}\n}\n\nfunction closeM(id){document.getElementById(id).classList.remove('open');}\ndocument.querySelectorAll('.mback').forEach(function(m){m.addEventListener('click',function(e){if(e.target===m)m.classList.remove('open');});});\n\nsetTheme(theme);setIconStyle(iconStyle);populateCatSel();populateAcSel();if(driveToken&&driveFileId){driveSt='sy';loadFromDrive();}else if(driveCid)initGAuth();\nrenderAll();\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
